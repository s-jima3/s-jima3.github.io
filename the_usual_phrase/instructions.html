<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;URL='https://soulfulsoft.github.io'">
    <title>Redirecting to New Site</title>
    <script>
        // meta refreshが効かない環境向けのバックアップ
        window.location.replace("https://soulfulsoft.github.io");
    </script>
</head>
<body>
    <p>新しいサイトへ移動しています...</p>
    <p>自動的に移動しない場合は、<a href="https://soulfulsoft.github.io">こちらのリンク</a>をクリックしてください。</p>
</body>
</html>
